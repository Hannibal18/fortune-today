<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘의 운세</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="container">
    <button id="theme-toggle" class="theme-toggle" aria-label="테마 전환">🌙</button>
    <h1>오늘의 운세</h1>
    <p>버튼을 눌러 당신의 운세를 확인하세요!</p>
    <button id="fortune-button">운세 보기</button>
    <div id="fortune-display"></div>

    <div class="contact-section">
      <hr>
      <h3>문의하기</h3>
      <form id="contact-form" action="https://formspree.io/f/xdalrnrk" method="POST" class="contact-form">
        <div class="form-group">
          <input type="text" name="name" placeholder="이름" required enterkeyhint="next" inputmode="text">
        </div>
        <div class="form-group">
          <input type="email" name="_replyto" placeholder="이메일 주소" required enterkeyhint="next" inputmode="email">
        </div>
        <div class="form-group">
          <input type="tel" name="phone" placeholder="전화번호 (예: 010-1234-5678)" enterkeyhint="next" inputmode="tel">
        </div>
        <div class="form-group file-group">
          <label for="attachment" class="file-label">📸 사진 첨부 (최대 5장)</label>
          <input type="file" id="attachment" name="attachment" accept="image/*" class="file-input" multiple>
          <div id="file-name" class="file-name">선택된 파일 없음</div>
          <div id="image-preview-list" class="image-preview-list"></div>
        </div>
        <div class="form-group">
          <textarea name="message" placeholder="문의 내용을 입력하세요" required enterkeyhint="done"></textarea>
        </div>
        <button type="submit" id="submit-button" class="submit-button">보내기</button>
        <div id="form-status" class="form-status"></div>
      </form>
    </div>
  </div>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
